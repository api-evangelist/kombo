specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Kombo
providerId: kombo
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - HRIS
  - Unified API
  - HR Tech
description: Kombo markets unlimited API calls and data volume on every plan. The public docs do not
  enumerate per-second / per-minute throttling thresholds for Kombo's own API; rate limits are typically
  inherited from the underlying connected HRIS / ATS / LMS systems and surfaced via job/sync status rather
  than per-call 429s.
sources:
  - https://kombo.dev/pricing
  - https://docs.kombo.dev/
notes: Kombo does not publish numeric rate limits. Per-tenant throttling is dictated by the upstream
  HR system that Kombo proxies (e.g. Workday TPS limits). Reconcile per-integration when authenticated
  customer data is available.
responseCodes:
  throttled: 429
  upstreamThrottled: 429
  serviceUnavailable: 503
limits:
  - name: Kombo platform API
    scope: tenant
    metric: requests_per_minute
    limit: 'unlimited per Kombo pricing; subject to underlying integration throttling'
  - name: Underlying-system sync frequency
    scope: integration
    metric: varies
    limit: 'sync cadence varies by plan and source system; Scale and Enterprise unlock higher frequency'
policies:
  - name: Sync orchestration
    description: Kombo manages polling and webhook processing against upstream HRIS systems; consumers
      should treat Kombo as eventually consistent and react to webhook deltas rather than poll.
  - name: Backoff
    description: On 429/5xx from Kombo, retry with exponential backoff and jitter; honor Retry-After.
  - name: Upstream-aware throttling
    description: When the source HR system (Workday, SAP, BambooHR, etc.) returns a rate-limit signal,
      Kombo surfaces it via sync errors; resolve by increasing the source system quota rather than retrying
      against Kombo.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
