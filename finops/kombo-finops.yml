specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Kombo
providerId: kombo
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - HRIS
  - Unified API
  - HR Tech
description: 'FOCUS-aligned FinOps for Kombo: tiered annual platform fee plus per-connected-customer
  charges, with unlimited API calls and data volume. Inactive integrations are not billed.'
sources:
  - https://kombo.dev/pricing
  - https://docs.kombo.dev/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Kombo Technologies GmbH
serviceCategory: HR Tech / Unified API
billingModel:
  pricingCategory: Tiered Subscription + Per-Customer
  billingFrequency: Annual
  billingCurrency: EUR/USD
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
focusColumns:
  ServiceName: Kombo
  ServiceCategory: Developer Tools
  ServiceSubcategory: Unified API
  ProviderName: Kombo
  PublisherName: Kombo Technologies GmbH
  InvoiceIssuerName: Kombo Technologies GmbH
  BillingCurrency: EUR
meters:
  - name: connected_customers
    unit: customer
    aggregation: max
    dimensions:
      - integration
      - category
  - name: active_integrations
    unit: integration
    aggregation: max
    dimensions:
      - source_system
      - category
  - name: platform_fee
    unit: year
    aggregation: sum
    dimensions:
      - plan
  - name: api_calls
    unit: request
    aggregation: sum
    dimensions:
      - integration
      - endpoint
    notes: Tracked for visibility; not billed (unlimited per pricing page).
  - name: synced_records
    unit: record
    aggregation: sum
    dimensions:
      - integration
      - object_type
principles:
  - name: Visibility
    description: Use the Kombo developer dashboard to monitor connected customers, active integrations,
      and sync errors per plan tier; pull the same data from the API for finance dashboards.
  - name: Allocation
    description: Tag connected customers with internal account IDs so per-customer Kombo cost can be allocated
      to the revenue line that customer represents.
  - name: Optimization
    description: Disconnect / pause integrations for churned or inactive end-customers (Kombo does not
      charge for inactive integrations); review tier upgrades against need for sandbox / SFTP / SLAs.
  - name: Accountability
    description: Account managers reconcile Kombo's connected-customer count quarterly against active
      revenue customers; renegotiate per-customer rate at the next annual cycle as volume grows.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
