specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Kombo
providerId: kombo
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - HRIS
  - Unified API
  - Integration
  - HR Tech
  - ATS
description: Kombo prices on flat annual platform fees plus per-connected-customer charges (not per API
  call) across three tiers — Start, Scale, Enterprise — with unlimited API calls and data volume on every
  plan. Specific dollar amounts are not published; Kombo offers a free POC and quotes per customer. Inactive
  integrations are not charged.
sources:
  - https://kombo.dev/pricing
plans:
  - id: kombo-start
    name: Start
    type: subscription
    description: Entry tier for early-stage startups; unlimited API calls + data volume, core integrations,
      read/write access, developer dashboard, webhooks, unlimited Slack/email support.
    entries:
      - label: Annual platform fee
        name: start_platform_fee
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: Per connected customer
        name: start_per_customer
        type: metered
        metric: connected_customer
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Unlimited API calls and data volume
      - name: Core integrations
      - name: Read/write API access
      - name: Developer dashboard
      - name: Error detection + webhooks
      - name: Unlimited Slack/email support
      - name: Self-serve onboarding
  - id: kombo-scale
    name: Scale
    type: subscription
    description: Tier for fast-growing startups and scale-ups; everything in Start plus sandbox access
      (SAP/Workday), higher sync frequency, prioritized requests, 30-day log retention, dedicated AM,
      SFTP integrations, 1 shared onboarding/mo.
    entries:
      - label: Annual platform fee
        name: scale_platform_fee
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: Per connected customer (volume-discounted)
        name: scale_per_customer
        type: metered
        metric: connected_customer
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: All Start features
      - name: Sandbox access (SAP, Workday, etc.)
      - name: Higher sync frequency
      - name: Prioritized feature requests
      - name: 30-day log retention
      - name: Dedicated account manager
      - name: SFTP integrations
      - name: Up to 1 shared customer onboarding per month
  - id: kombo-enterprise
    name: Enterprise
    type: enterprise
    description: Large-organization tier; everything in Scale plus white-glove onboarding, 90+ day log
      retention, SAML SSO, custom integrations with SLAs, strategic reviews, support SLAs, 4 shared onboardings/mo.
    entries:
      - label: Annual platform fee
        name: enterprise_platform_fee
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: custom
        userMultiplied: false
      - label: Per connected customer (volume-discounted)
        name: enterprise_per_customer
        type: metered
        metric: connected_customer
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: All Scale features
      - name: White-glove onboarding
      - name: 90+ day log retention
      - name: SAML SSO
      - name: Custom integrations with SLAs
      - name: Strategic business reviews
      - name: Support SLAs
      - name: Direct partnership access
      - name: Up to 4 shared customer onboardings per month
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
